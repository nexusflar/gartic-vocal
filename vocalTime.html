<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Voc - Terminé</title>
    <style>
        :root {
            --bg: #0b0c0d;
            --card: #15171a;
            --discord: #5865F2;
            --discord-hover: #4752c4;
            --error: #ff4747;
            --success: #00fa9a;
            --text: #ececec;
            --text-muted: #80848e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-badge {
            background: rgba(255, 71, 71, 0.1);
            color: var(--error);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text); }
        h2 { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; margin: 15px 0 5px; }

        .timer { font-size: 2.8rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
        
        .remaining-sub { color: var(--success); font-size: 1.1rem; font-weight: 700; margin-top: 10px; }
        
        .hour-counter {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-top: 20px;
        }

        .hour-total { color: var(--text-muted); font-weight: 400; }

        .progress-bar-bg {
            background: #2b2d31;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0 8px;
        }

        #fill { 
            background: var(--success); 
            height: 100%; 
            width: 100%; 
        }

        .perc-text { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }

        .btn-closed {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2b2d31;
            color: var(--text-muted);
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            gap: 10px;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status-badge">● Vocal Terminé</div>
    
    <h1>Gartic Voc</h1>
    
    <h2>Durée totale</h2>
    <div id="elapsed" class="timer">168:00:00</div>
    
    <div class="remaining-sub">OBJECTIF ATTEINT !</div>

    <div class="hour-counter">
        <span>168</span>H <span class="hour-total">/ 168H</span>
    </div>

    <div class="progress-bar-bg">
        <div id="fill"></div>
    </div>
    <div class="perc-text">100% de l'objectif</div>

    <div class="btn-closed">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
        Le vocal est fermé
    </div>
</div>

</body>
</html>
